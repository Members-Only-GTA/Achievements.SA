name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.txt'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config:
          - name: RA
            conf: "Release GTA-SA RA"
            zip: Achievements.SA.RA.zip
            bindir: "bin/GTA-SA RA/Release"
            txd: "gamefiles/RA/achievements.txd"
          - name: Steam
            conf: "Release GTA-SA Steam"
            zip: Achievements.SA.Steam.zip
            bindir: "bin/GTA-SA Steam/Release"
            txd: "gamefiles/Steam/achievements.txd"

    steps:
      - uses: actions/checkout@v4

      - name: Cache plugin-sdk
        uses: actions/cache@v4
        id: cache-pluginsdk
        with:
          path: ${{ runner.temp }}\plugin-sdk
          key: plugin-sdk-${{ runner.os }}-v1

      - name: Clone plugin-sdk
        if: steps.cache-pluginsdk.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/DK22Pac/plugin-sdk.git "${{ runner.temp }}\plugin-sdk"

      - uses: microsoft/setup-msbuild@v2

      - name: Build plugin-sdk
        if: steps.cache-pluginsdk.outputs.cache-hit != 'true'
        run: |
          & "${{ runner.temp }}\plugin-sdk\tools\premake\premake5.exe" `
            --file="${{ runner.temp }}\plugin-sdk\tools\premake\premake5.lua" `
            --pluginsdkdir="${{ runner.temp }}\plugin-sdk" `
            vs2022
          msbuild "${{ runner.temp }}\plugin-sdk\plugin_sa\Plugin_SA.vcxproj" `
            /p:Configuration=Release `
            /p:Platform=Win32 `
            /p:PlatformToolset=v145 `
            /p:PLUGIN_SDK_DIR="${{ runner.temp }}\plugin-sdk"

      - name: Build (${{ matrix.config.name }})
        run: |
          msbuild Achievements.vcxproj `
            /p:Configuration="${{ matrix.config.conf }}" `
            /p:Platform=Win32 `
            /p:PLUGIN_SDK_DIR="${{ runner.temp }}\plugin-sdk"

      - name: Sign (${{ matrix.config.name }})
        env:
          PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:PFX_BASE64) { Write-Host "No cert configured, skipping."; exit 0 }
          $pfxPath = "${{ runner.temp }}\cert.pfx"
          [System.Convert]::FromBase64String($env:PFX_BASE64) | Set-Content $pfxPath -AsByteStream
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Where-Object { $_.Directory.Name -eq "x86" } | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /f $pfxPath /p $env:PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "${{ matrix.config.bindir }}/Achievements.SA.asi"
          Remove-Item $pfxPath

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "${{ matrix.config.bindir }}/Achievements.SA.asi" dist/Achievements.SA.asi
          Copy-Item "${{ matrix.config.txd }}" dist/achievements.txd
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.config.zip }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}
          path: ${{ matrix.config.zip }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            Achievements.SA.RA.zip
            Achievements.SA.Steam.zip
